version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - config/secrets.env
    environment:
      - LAUNCH_DASHBOARD=false
    volumes:
      - bot_data:/app/data
      - bot_logs:/app/logs
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    env_file:
      - config/secrets.env
    ports:
      - "8501:8501"
    volumes:
      - bot_data:/app/data
    depends_on:
      - bot
    restart: unless-stopped

volumes:
  bot_data:
  bot_logs:
